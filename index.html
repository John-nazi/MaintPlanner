<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Editor PDF Telegram</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
    }

    .contenedor {
      max-width: 600px;
      margin: 0 auto;
    }

    .estado {
      padding: 16px;
      border-radius: 10px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f2);
      word-break: break-all;
    }

    .titulo {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="contenedor">
    <h1>Editor PDF</h1>

    <div class="estado">
      <div class="titulo">Archivo recibido</div>
      <div id="resultado">Buscando información del PDF...</div>
    </div>
  </div>

  <script>
    const telegram = window.Telegram.WebApp;

    telegram.ready();
    telegram.expand();

    const parametros = new URLSearchParams(window.location.search);
    const fileId = parametros.get("file_id");

    const resultado = document.getElementById("resultado");

    if (fileId) {
      resultado.textContent = "file_id: " + fileId;
    } else {
      resultado.textContent = "No se recibió ningún file_id.";
    }
  </script>
</body>
</html>
